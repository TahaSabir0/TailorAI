<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailorAI - Playful Pop</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 380px; min-height: 480px; font-family: 'Nunito', sans-serif;
    background: #fff5e6; color: #2d2319; position: relative; overflow: hidden;
  }

  /* Confetti dots */
  .dot { position: absolute; border-radius: 50%; opacity: 0.25; pointer-events: none; z-index: 0; }
  .dot-1 { width: 40px; height: 40px; background: #ff6b35; top: -10px; right: 30px; }
  .dot-2 { width: 24px; height: 24px; background: #9b5de5; top: 80px; left: -6px; }
  .dot-3 { width: 32px; height: 32px; background: #00c49a; bottom: 40px; right: -8px; }
  .dot-4 { width: 18px; height: 18px; background: #ffcc02; bottom: 100px; left: 20px; }

  .container { position: relative; z-index: 1; padding: 20px; }

  /* Header */
  .header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px;
  }
  .title { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 26px; color: #2d2319; cursor: default; }
  .title span { display: inline-block; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .title:hover span:nth-child(odd) { transform: rotate(-6deg) scale(1.08); }
  .title:hover span:nth-child(even) { transform: rotate(5deg) scale(1.08); }
  .title .accent-t { color: #ff6b35; }
  .title .accent-a2 { color: #9b5de5; }
  .title .accent-i { color: #00c49a; }

  .settings-btn {
    width: 40px; height: 40px; border-radius: 50%; border: 3px solid #ffcc02;
    background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    box-shadow: 0 2px 8px rgba(255,204,2,0.25);
  }
  .settings-btn:hover { transform: scale(1.12) rotate(15deg); box-shadow: 0 4px 14px rgba(255,204,2,0.4); }
  .settings-btn:active { transform: scale(0.92); }
  .settings-btn svg { width: 20px; height: 20px; fill: #ffcc02; }
  #closeIcon { display: none; }

  /* Settings Panel */
  #settingsPanel {
    display: none; background: #fff; border: 3px solid #9b5de5; border-radius: 20px;
    padding: 16px; margin-bottom: 16px;
    animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 16px rgba(155,93,229,0.15);
  }
  @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(-8px); } to { opacity: 1; transform: scale(1) translateY(0); } }

  .settings-section { margin-bottom: 14px; }
  .settings-section:last-child { margin-bottom: 0; }
  .settings-label {
    font-family: 'Fredoka', sans-serif; font-weight: 600; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1.5px; color: #9b5de5; margin-bottom: 8px;
  }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff5e6; border-radius: 12px; padding: 10px 14px;
  }
  .settings-info { display: flex; flex-direction: column; gap: 1px; }
  .settings-primary { font-weight: 700; font-size: 13px; color: #2d2319; }
  .settings-secondary { font-size: 11px; color: #8a7e72; }
  .settings-actions { display: flex; gap: 6px; }

  .pill-btn {
    font-family: 'Fredoka', sans-serif; font-weight: 500; font-size: 11px;
    padding: 5px 12px; border-radius: 999px; border: 2px solid; cursor: pointer;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), background 0.2s;
    background: transparent;
  }
  .pill-btn:hover { transform: scale(1.06); }
  .pill-btn:active { transform: scale(0.92); }
  .pill-btn.coral { border-color: #ff6b35; color: #ff6b35; }
  .pill-btn.coral:hover { background: #ff6b35; color: #fff; }
  .pill-btn.red { border-color: #e74c5e; color: #e74c5e; }
  .pill-btn.red:hover { background: #e74c5e; color: #fff; }
  .pill-btn.teal { border-color: #00c49a; color: #00c49a; }
  .pill-btn.teal:hover { background: #00c49a; color: #fff; }

  .divider { height: 2px; background: linear-gradient(90deg, #ffcc02, #ff6b35, #9b5de5, #00c49a); border-radius: 2px; opacity: 0.4; margin: 14px 0; }

  /* Tailor Button */
  #tailorBtn {
    width: 100%; padding: 14px; font-family: 'Fredoka', sans-serif; font-weight: 700;
    font-size: 18px; color: #fff; background: #ff6b35; border: none; border-radius: 999px;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
    box-shadow: 0 4px 16px rgba(255,107,53,0.35); margin-bottom: 12px;
  }
  #tailorBtn:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 6px 22px rgba(255,107,53,0.45); }
  #tailorBtn:active:not(:disabled) { transform: scale(0.92); }
  #tailorBtn:disabled { opacity: 0.75; cursor: not-allowed; }

  .loader {
    display: none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .scissors { font-size: 18px; margin-right: 2px; }

  /* Hint Text */
  #hintText {
    text-align: center; font-size: 13px; color: #8a7e72; font-weight: 600; margin-bottom: 16px;
    min-height: 18px;
  }

  /* Result Card */
  #resultCard {
    display: none; background: #fff; border: 3px solid #00c49a; border-radius: 20px;
    padding: 18px; animation: wiggleIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 4px 16px rgba(0,196,154,0.15);
  }
  @keyframes wiggleIn {
    0% { opacity: 0; transform: scale(0.85) rotate(-2deg); }
    50% { transform: scale(1.03) rotate(1deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  .result-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .check-circle {
    width: 42px; height: 42px; border-radius: 50%; background: #00c49a; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 10px rgba(0,196,154,0.3);
  }
  .check-circle svg { width: 22px; height: 22px; fill: #fff; }
  .result-info { flex: 1; }
  .result-title { font-family: 'Fredoka', sans-serif; font-weight: 700; font-size: 16px; color: #2d2319; }
  .result-company { font-size: 13px; color: #8a7e72; font-weight: 600; }
  .result-file {
    font-size: 11px; color: #9b5de5; background: rgba(155,93,229,0.08);
    padding: 6px 12px; border-radius: 10px; margin-bottom: 12px;
    word-break: break-all; font-weight: 600;
  }
  .result-actions { display: flex; gap: 8px; }
  .result-actions .pill-btn { flex: 1; text-align: center; padding: 8px; font-size: 12px; }
</style>
</head>
<body>
  <div class="dot dot-1"></div>
  <div class="dot dot-2"></div>
  <div class="dot dot-3"></div>
  <div class="dot dot-4"></div>

  <div class="container">
    <div class="header">
      <div class="title">
        <span class="accent-t">T</span><span>a</span><span>i</span><span>l</span><span>o</span><span>r</span><span class="accent-a2">A</span><span class="accent-i">I</span>
      </div>
      <button class="settings-btn" id="settingsBtn">
        <svg id="gearIcon" viewBox="0 0 24 24"><path d="M19.14 12.94a7.07 7.07 0 000-1.88l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96a7.04 7.04 0 00-1.63-.94l-.36-2.54A.48.48 0 0013.92 2h-3.84a.48.48 0 00-.48.41l-.36 2.54a7.04 7.04 0 00-1.63.94l-2.39-.96a.49.49 0 00-.59.22L2.71 8.47a.49.49 0 00.12.61l2.03 1.58a7.07 7.07 0 000 1.88L2.83 14.1a.49.49 0 00-.12.61l1.92 3.32a.49.49 0 00.59.22l2.39-.96c.5.38 1.04.7 1.63.94l.36 2.54a.48.48 0 00.48.41h3.84a.48.48 0 00.48-.41l.36-2.54a7.04 7.04 0 001.63-.94l2.39.96a.49.49 0 00.59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.03-1.56zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
        <svg id="closeIcon" viewBox="0 0 24 24"><path d="M18.3 5.71a1 1 0 00-1.41 0L12 10.59 7.11 5.7A1 1 0 005.7 7.11L10.59 12 5.7 16.89a1 1 0 101.41 1.41L12 13.41l4.89 4.89a1 1 0 001.41-1.41L13.41 12l4.89-4.89a1 1 0 000-1.4z"/></svg>
      </button>
    </div>

    <div id="settingsPanel">
      <div class="settings-section">
        <div class="settings-label">Your Resume</div>
        <div class="settings-row">
          <div class="settings-info">
            <span class="settings-primary">resume.pdf &middot; Mar 15</span>
            <span class="settings-secondary">Taha S.</span>
          </div>
          <div class="settings-actions">
            <button class="pill-btn coral">Replace</button>
            <button class="pill-btn red">Delete</button>
          </div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="settings-section">
        <div class="settings-label">API Key</div>
        <div class="settings-row">
          <div class="settings-info">
            <span class="settings-primary">AIza&middot;&middot;&middot;&middot;&middot;&middot;</span>
          </div>
          <div class="settings-actions">
            <button class="pill-btn teal">Update</button>
          </div>
        </div>
      </div>
    </div>

    <button id="tailorBtn">
      <span class="scissors">&#9986;</span>
      <span class="btn-text">Tailor It!</span>
      <div class="loader"></div>
    </button>

    <div id="hintText">Generate a cover letter for this job posting</div>

    <div id="resultCard">
      <div class="result-top">
        <div class="check-circle">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
        </div>
        <div class="result-info">
          <div class="result-title">Software Engineer</div>
          <div class="result-company">at Google</div>
        </div>
      </div>
      <div class="result-file">Taha-S-Software-Engineer-CoverLetter.pdf</div>
      <div class="result-actions">
        <button class="pill-btn coral">&#128203; Copy</button>
        <button class="pill-btn teal">&#11015; Download</button>
      </div>
    </div>
  </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const tailorBtn = document.getElementById('tailorBtn');
  const resultCard = document.getElementById('resultCard');
  const hintText = document.getElementById('hintText');
  const btnText = tailorBtn.querySelector('.btn-text');
  const loader = tailorBtn.querySelector('.loader');
  let settingsOpen = false;

  settingsBtn.addEventListener('click', () => {
    settingsOpen = !settingsOpen;
    settingsPanel.style.display = settingsOpen ? 'block' : 'none';
    document.getElementById('gearIcon').style.display = settingsOpen ? 'none' : 'block';
    document.getElementById('closeIcon').style.display = settingsOpen ? 'block' : 'none';
  });

  tailorBtn.addEventListener('click', () => {
    if (tailorBtn.disabled) return;
    btnText.style.display = 'none';
    loader.style.display = 'inline-block';
    tailorBtn.disabled = true;
    hintText.textContent = 'Extracting job posting...';
    resultCard.style.display = 'none';
    setTimeout(() => { hintText.textContent = 'Generating cover letter...'; }, 1200);
    setTimeout(() => { hintText.textContent = 'Generating PDF...'; }, 2400);
    setTimeout(() => {
      btnText.style.display = 'inline-block';
      loader.style.display = 'none';
      tailorBtn.disabled = false;
      resultCard.style.display = 'block';
      hintText.textContent = 'Generate another cover letter';
    }, 3500);
  });
});
</script>
</body>
</html>
