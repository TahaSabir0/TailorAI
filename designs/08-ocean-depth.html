<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=380">
<title>TailorAI - Ocean Depth</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 380px;
    min-height: 520px;
    font-family: 'Sora', sans-serif;
    font-weight: 400;
    background: linear-gradient(180deg, #0c1445 0%, #0a2463 40%, #1b3a5c 100%);
    color: #f0f4f8;
    overflow: hidden;
    position: relative;
  }

  /* Floating bubbles */
  .bubble {
    position: fixed;
    border-radius: 50%;
    background: rgba(0,229,199,0.12);
    pointer-events: none;
    animation: float linear infinite;
  }
  .bubble:nth-child(1) { width: 6px; height: 6px; left: 15%; bottom: -10px; animation-duration: 12s; animation-delay: 0s; }
  .bubble:nth-child(2) { width: 4px; height: 4px; left: 55%; bottom: -10px; animation-duration: 15s; animation-delay: 3s; opacity: 0.7; }
  .bubble:nth-child(3) { width: 8px; height: 8px; left: 80%; bottom: -10px; animation-duration: 10s; animation-delay: 1s; }
  .bubble:nth-child(4) { width: 3px; height: 3px; left: 35%; bottom: -10px; animation-duration: 14s; animation-delay: 5s; opacity: 0.5; }

  @keyframes float {
    0% { transform: translateY(0) translateX(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-540px) translateX(20px); opacity: 0; }
  }

  /* Wave at bottom */
  .wave-container {
    position: fixed;
    bottom: -2px;
    left: 0;
    width: 100%;
    height: 50px;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .wave-container svg {
    position: absolute;
    bottom: 0;
    width: 200%;
    height: 50px;
    animation: wave 8s ease-in-out infinite alternate;
  }
  @keyframes wave {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 24px 16px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #00e5c7, #4da8da);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .settings-btn {
    width: 38px; height: 38px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
  }
  .settings-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(0,229,199,0.4); }
  .settings-btn svg { width: 18px; height: 18px; }

  /* Settings Panel */
  .settings-panel {
    display: none;
    padding: 4px 24px 16px;
    position: relative;
    z-index: 1;
    animation: panelFade 0.35s ease;
  }
  @keyframes panelFade {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .settings-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(240,244,248,0.4);
    margin-bottom: 8px;
    margin-top: 12px;
  }

  .settings-card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 12px 16px;
    backdrop-filter: blur(10px);
    transition: border-color 0.3s;
  }
  .settings-card:hover { border-color: rgba(0,229,199,0.3); }

  .settings-card-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cv-info .cv-filename { font-size: 13px; font-weight: 500; color: #f0f4f8; }
  .cv-info .cv-meta { font-size: 11px; color: rgba(240,244,248,0.5); margin-top: 1px; }

  .card-actions { display: flex; gap: 6px; }

  .action-btn {
    font-family: 'Sora', sans-serif;
    font-size: 11px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid rgba(0,229,199,0.3);
    background: rgba(0,229,199,0.08);
    color: #00e5c7;
    cursor: pointer;
    transition: all 0.25s;
  }
  .action-btn:hover { background: rgba(0,229,199,0.18); border-color: #00e5c7; }
  .action-btn.danger { border-color: rgba(255,100,100,0.3); color: #ff6464; background: rgba(255,100,100,0.06); }
  .action-btn.danger:hover { background: rgba(255,100,100,0.15); border-color: #ff6464; }

  .api-key {
    font-size: 13px;
    font-weight: 400;
    color: rgba(240,244,248,0.65);
    letter-spacing: 1px;
  }

  .panel-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    margin-top: 18px;
  }

  /* Main Content */
  .content {
    padding: 24px 24px 16px;
    position: relative;
    z-index: 1;
  }

  .tailor-btn {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #00e5c7, #4da8da);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Sora', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 4px 20px rgba(0,229,199,0.25);
    position: relative;
    overflow: hidden;
  }
  .tailor-btn::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(255,255,255,0.25) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tailor-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,229,199,0.35); }
  .tailor-btn:hover::before { opacity: 1; }
  .tailor-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 0 4px 20px rgba(0,229,199,0.15); }

  .loader {
    display: none;
    width: 20px; height: 20px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .hint-text {
    text-align: center;
    font-size: 12px;
    color: rgba(240,244,248,0.45);
    margin-top: 14px;
    transition: opacity 0.4s;
    min-height: 18px;
  }

  /* Result Card */
  .result-card {
    display: none;
    margin-top: 20px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 18px 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 25px rgba(0,229,199,0.12);
    animation: resultIn 0.45s ease;
  }
  @keyframes resultIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #0c1445;
    background: linear-gradient(135deg, #00e5c7, #4da8da);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .result-title { font-size: 18px; font-weight: 600; color: #f0f4f8; line-height: 1.3; }
  .result-company { font-size: 13px; color: rgba(240,244,248,0.5); margin-top: 2px; }
  .result-filename {
    font-size: 10px;
    color: rgba(240,244,248,0.3);
    margin-top: 10px;
    font-family: monospace;
    letter-spacing: 0.3px;
  }

  .result-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
    margin: 14px 0;
  }

  .result-actions { display: flex; gap: 8px; }
  .result-btn {
    flex: 1;
    font-family: 'Sora', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 14px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s;
    text-align: center;
  }
  .result-btn.primary {
    background: linear-gradient(135deg, #00e5c7, #4da8da);
    border: none;
    color: #fff;
    box-shadow: 0 2px 12px rgba(0,229,199,0.2);
  }
  .result-btn.primary:hover { transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,229,199,0.3); }
  .result-btn.secondary {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #f0f4f8;
  }
  .result-btn.secondary:hover { background: rgba(255,255,255,0.12); border-color: rgba(0,229,199,0.3); }

  .spacer { height: 60px; position: relative; z-index: 1; }
</style>
</head>
<body>

  <!-- Bubbles -->
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <!-- Wave -->
  <div class="wave-container">
    <svg viewBox="0 0 1440 50" preserveAspectRatio="none">
      <path d="M0,25 C180,45 360,5 540,25 C720,45 900,5 1080,25 C1260,45 1440,5 1440,25 L1440,50 L0,50 Z" fill="rgba(0,229,199,0.08)"/>
      <path d="M0,30 C200,48 400,12 600,30 C800,48 1000,12 1200,30 C1400,48 1440,20 1440,30 L1440,50 L0,50 Z" fill="rgba(77,168,218,0.06)"/>
    </svg>
  </div>

  <div class="header">
    <div class="title">TailorAI</div>
    <button class="settings-btn" id="settingsBtn">
      <svg id="gearIcon" viewBox="0 0 24 24" fill="none" stroke="#4da8da" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <svg id="closeIcon" style="display:none" viewBox="0 0 24 24" fill="none" stroke="#4da8da" stroke-width="2" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">Resume</div>
    <div class="settings-card">
      <div class="settings-card-row">
        <div class="cv-info">
          <div class="cv-filename">resume.pdf</div>
          <div class="cv-meta">Mar 15 &middot; Taha S.</div>
        </div>
        <div class="card-actions">
          <button class="action-btn">Replace</button>
          <button class="action-btn danger">Delete</button>
        </div>
      </div>
    </div>

    <div class="settings-label">API Key</div>
    <div class="settings-card">
      <div class="settings-card-row">
        <span class="api-key">AIza&middot;&middot;&middot;&middot;&middot;&middot;</span>
        <button class="action-btn">Update</button>
      </div>
    </div>
    <div class="panel-divider"></div>
  </div>

  <div class="content">
    <button class="tailor-btn" id="tailorBtn">
      <span class="btn-text">Tailor</span>
      <span class="loader"></span>
    </button>
    <div class="hint-text" id="hintText">Generate a cover letter for this job posting</div>

    <div class="result-card" id="resultCard">
      <div class="result-badge">Ready</div>
      <div class="result-title">Software Engineer</div>
      <div class="result-company">at Google</div>
      <div class="result-filename">Taha-S-Software-Engineer-CoverLetter.pdf</div>
      <div class="result-divider"></div>
      <div class="result-actions">
        <button class="result-btn secondary">Copy</button>
        <button class="result-btn primary">Download</button>
      </div>
    </div>
  </div>

  <div class="spacer"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const tailorBtn = document.getElementById('tailorBtn');
  const resultCard = document.getElementById('resultCard');
  const hintText = document.getElementById('hintText');
  const btnText = tailorBtn.querySelector('.btn-text');
  const loader = tailorBtn.querySelector('.loader');
  let settingsOpen = false;

  settingsBtn.addEventListener('click', () => {
    settingsOpen = !settingsOpen;
    settingsPanel.style.display = settingsOpen ? 'block' : 'none';
    document.getElementById('gearIcon').style.display = settingsOpen ? 'none' : 'block';
    document.getElementById('closeIcon').style.display = settingsOpen ? 'block' : 'none';
  });

  // Ripple effect on button hover
  tailorBtn.addEventListener('mousemove', (e) => {
    const rect = tailorBtn.getBoundingClientRect();
    tailorBtn.style.setProperty('--mx', ((e.clientX - rect.left) / rect.width * 100) + '%');
    tailorBtn.style.setProperty('--my', ((e.clientY - rect.top) / rect.height * 100) + '%');
  });

  tailorBtn.addEventListener('click', () => {
    if (tailorBtn.disabled) return;
    btnText.style.display = 'none';
    loader.style.display = 'inline-block';
    tailorBtn.disabled = true;
    hintText.textContent = 'Extracting job posting...';
    resultCard.style.display = 'none';
    setTimeout(() => { hintText.textContent = 'Generating cover letter...'; }, 1200);
    setTimeout(() => { hintText.textContent = 'Generating PDF...'; }, 2400);
    setTimeout(() => {
      btnText.style.display = 'inline-block';
      loader.style.display = 'none';
      tailorBtn.disabled = false;
      resultCard.style.display = 'block';
      hintText.textContent = 'Generate another cover letter';
    }, 3500);
  });
});
</script>
</body>
</html>
