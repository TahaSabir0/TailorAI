<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TailorAI - Brutalist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; border-radius: 0 !important; }

  body {
    width: 380px;
    font-family: 'Space Mono', monospace;
    background: #ffffff;
    color: #000000;
    padding: 0;
    -webkit-font-smoothing: none;
  }

  .popup {
    width: 380px;
    min-height: 200px;
    border: 3px solid #000;
  }

  /* HEADER */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 3px solid #000;
    background: #fff;
  }

  .title {
    font-size: 22px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 3px;
    line-height: 1;
  }

  .title .dot {
    color: #ff0000;
    font-weight: 700;
  }

  .settings-btn {
    width: 36px;
    height: 36px;
    background: #fff;
    border: 3px solid #000;
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 3px 3px 0px #000;
    transition: none;
    line-height: 1;
  }

  .settings-btn:hover {
    background: #000;
    color: #fff;
    box-shadow: 3px 3px 0px #ff0000;
  }

  #closeIcon { display: none; }

  /* SETTINGS PANEL */
  .settings-panel {
    display: none;
    border-bottom: 3px solid #000;
    background: #fff;
  }

  .settings-heading {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    padding: 14px 20px 0;
    color: #666;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid #000;
  }

  .setting-row:last-child { border-bottom: none; }

  .setting-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 2px;
  }

  .setting-value {
    font-size: 13px;
    font-weight: 700;
    color: #000;
  }

  .setting-actions {
    display: flex;
    gap: 6px;
  }

  .action-btn {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 5px 10px;
    border: 2px solid #000;
    background: #fff;
    color: #000;
    cursor: pointer;
    box-shadow: 2px 2px 0px #000;
    transition: none;
  }

  .action-btn:hover {
    background: #000;
    color: #fff;
    box-shadow: 2px 2px 0px #ff0000;
  }

  .action-btn.danger {
    border-color: #ff0000;
    color: #ff0000;
  }

  .action-btn.danger:hover {
    background: #ff0000;
    color: #fff;
    box-shadow: 2px 2px 0px #000;
  }

  /* MAIN BODY */
  .main {
    padding: 20px;
  }

  /* TAILOR BUTTON */
  .tailor-btn {
    width: 100%;
    padding: 16px;
    background: #000;
    color: #fff;
    border: 3px solid #000;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 4px;
    cursor: pointer;
    box-shadow: 4px 4px 0px #000;
    transition: none;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .tailor-btn:hover:not(:disabled) {
    background: #fff;
    color: #000;
    box-shadow: 4px 4px 0px #ff0000;
  }

  .tailor-btn:disabled {
    cursor: wait;
    opacity: 0.7;
  }

  .loader {
    display: none;
    width: 16px;
    height: 16px;
    border: 3px solid #fff;
    border-top-color: transparent;
    animation: spin 0.4s linear infinite;
  }

  .tailor-btn:hover:not(:disabled) .loader {
    border-color: #000;
    border-top-color: transparent;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* HINT TEXT */
  .hint {
    margin-top: 14px;
    font-size: 12px;
    color: #666;
    text-align: center;
    letter-spacing: 1px;
  }

  /* RESULT CARD */
  .result-card {
    display: none;
    margin-top: 16px;
    background: #ff0000;
    color: #fff;
    border: 3px solid #000;
    box-shadow: 4px 4px 0px #000;
    padding: 16px 18px;
  }

  .result-card:hover {
    box-shadow: 6px 6px 0px #000;
  }

  .result-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    opacity: 0.8;
    margin-bottom: 6px;
  }

  .result-title {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .result-company {
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
  }

  .result-file {
    font-size: 10px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 2px solid rgba(255,255,255,0.3);
    word-break: break-all;
    letter-spacing: 1px;
  }

  .result-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .result-btn {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 8px;
    border: 2px solid #fff;
    background: transparent;
    color: #fff;
    cursor: pointer;
    text-align: center;
    transition: none;
  }

  .result-btn:hover {
    background: #fff;
    color: #ff0000;
  }

  /* RED LEFT ACCENT BAR */
  .accent-bar {
    width: 100%;
    height: 4px;
    background: #ff0000;
  }
</style>
</head>
<body>
<div class="popup">
  <div class="accent-bar"></div>

  <div class="header">
    <div class="title">TAILORAI<span class="dot">.</span></div>
    <button class="settings-btn" id="settingsBtn">
      <span id="gearIcon">+</span>
      <span id="closeIcon">x</span>
    </button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-heading">// CONFIG</div>
    <div class="setting-row">
      <div>
        <div class="setting-label">RESUME</div>
        <div class="setting-value">resume.pdf &middot; Mar 15</div>
        <div class="setting-value" style="font-size:11px;color:#666;margin-top:2px;">Taha S.</div>
      </div>
      <div class="setting-actions">
        <button class="action-btn">REPLACE</button>
        <button class="action-btn danger">DELETE</button>
      </div>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-label">API KEY</div>
        <div class="setting-value">AIza&middot;&middot;&middot;&middot;&middot;&middot;</div>
      </div>
      <div class="setting-actions">
        <button class="action-btn">UPDATE</button>
      </div>
    </div>
  </div>

  <div class="main">
    <button class="tailor-btn" id="tailorBtn">
      <span class="btn-text">TAILOR</span>
      <div class="loader"></div>
    </button>
    <div class="hint" id="hintText">[Generate a cover letter for this job posting]</div>

    <div class="result-card" id="resultCard">
      <div class="result-label">// OUTPUT</div>
      <div class="result-title">Software Engineer</div>
      <div class="result-company">at Google</div>
      <div class="result-file">Taha-S-Software-Engineer-CoverLetter.pdf</div>
      <div class="result-actions">
        <button class="result-btn">COPY</button>
        <button class="result-btn">DOWNLOAD</button>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const tailorBtn = document.getElementById('tailorBtn');
  const resultCard = document.getElementById('resultCard');
  const hintText = document.getElementById('hintText');
  const btnText = tailorBtn.querySelector('.btn-text');
  const loader = tailorBtn.querySelector('.loader');
  let settingsOpen = false;

  settingsBtn.addEventListener('click', () => {
    settingsOpen = !settingsOpen;
    settingsPanel.style.display = settingsOpen ? 'block' : 'none';
    document.getElementById('gearIcon').style.display = settingsOpen ? 'none' : 'block';
    document.getElementById('closeIcon').style.display = settingsOpen ? 'block' : 'none';
  });

  tailorBtn.addEventListener('click', () => {
    if (tailorBtn.disabled) return;
    btnText.style.display = 'none';
    loader.style.display = 'inline-block';
    tailorBtn.disabled = true;
    hintText.textContent = '[Extracting job posting...]';
    resultCard.style.display = 'none';
    setTimeout(() => { hintText.textContent = '[Generating cover letter...]'; }, 1200);
    setTimeout(() => { hintText.textContent = '[Generating PDF...]'; }, 2400);
    setTimeout(() => {
      btnText.style.display = 'inline-block';
      loader.style.display = 'none';
      tailorBtn.disabled = false;
      resultCard.style.display = 'block';
      hintText.textContent = '[Generate another cover letter]';
    }, 3500);
  });
});
</script>
</body>
</html>
