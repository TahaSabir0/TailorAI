<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TailorAI</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">
    <!-- Header (always visible) -->
    <div class="header">
      <h1>TailorAI</h1>
      <button id="settingsBtn" class="icon-btn" title="Settings" style="display:none">
        <svg id="settingsIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"></path>
          <path d="M19.071 19.071L15.5 15.5m0-7l3.571-3.571M4.929 4.929L8.5 8.5m0 7l-3.571 3.571"></path>
        </svg>
        <svg id="closeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Setup cards (only when setup incomplete) -->
    <div id="setupCards">
      <div id="apiKeyCard" class="setup-card" style="display:none">
        <label class="setup-card-label">API Key</label>
        <div class="setup-card-row">
          <input type="password" id="apiKeyInput" placeholder="AIza..." />
          <button id="saveApiKeyBtn" class="compact-btn">Save</button>
        </div>
        <p class="help-text">
          Get your free key from
          <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a>
        </p>
      </div>

      <div id="cvCard" class="setup-card" style="display:none">
        <label class="setup-card-label">Upload CV</label>
        <p id="cvCardHint" class="setup-card-hint"></p>
        <input type="file" id="cvUpload" accept=".pdf,.docx" style="display:none">
        <button id="uploadCvBtn" class="compact-btn full-width">Choose File</button>
      </div>
    </div>

    <!-- Settings panel (toggled by gear) -->
    <div id="settingsPanel" style="display:none">
      <div id="cvSettings" class="settings-card">
        <label class="settings-card-label">CV</label>
        <div id="cvSettingsInfo" class="settings-card-info">
          <span class="settings-card-detail" id="cvFileName"></span>
          <span class="settings-card-detail" id="cvUserName"></span>
        </div>
        <div class="settings-card-actions">
          <input type="file" id="cvUploadSettings" accept=".pdf,.docx" style="display:none">
          <button id="replaceCvBtn" class="compact-btn">Replace</button>
          <button id="deleteCvBtn" class="compact-btn danger">Delete</button>
        </div>
      </div>

      <div id="apiKeySettings" class="settings-card">
        <label class="settings-card-label">API Key</label>
        <div id="apiKeyDisplay" class="settings-card-info">
          <span class="settings-card-detail" id="apiKeyMasked"></span>
        </div>
        <div id="apiKeyUpdateRow" class="setup-card-row" style="display:none">
          <input type="password" id="apiKeyUpdateInput" placeholder="AIza..." />
          <button id="updateApiKeyBtn" class="compact-btn">Save</button>
        </div>
        <button id="showApiKeyUpdateBtn" class="compact-btn">Update</button>
      </div>
    </div>

    <!-- Result card (after generation) -->
    <div id="resultCard" class="result-card" style="display:none">
      <div class="result-card-header">
        <svg class="result-check" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"></polyline>
        </svg>
        <div class="result-card-titles">
          <span class="result-job-title" id="resultJobTitle"></span>
          <span class="result-company" id="resultCompany"></span>
          <span class="result-filename" id="resultFilename"></span>
        </div>
      </div>
      <div class="result-card-actions">
        <button id="copyBtn" class="compact-btn">Copy</button>
        <button id="downloadBtn" class="compact-btn">Download</button>
      </div>
    </div>

    <!-- Primary action (always visible) -->
    <div class="action-section">
      <button id="tailorBtn" class="tailor-btn" disabled>
        <span class="btn-text">Tailor</span>
        <span class="loader" style="display:none"></span>
      </button>
      <p id="hintText" class="hint-text">Complete setup to start</p>
    </div>

    <!-- Toast messages -->
    <div class="message-section" id="messageSection" style="display:none">
      <p id="messageText"></p>
    </div>
  </div>

  <!-- External libraries -->
  <script src="../libs/mammoth.browser.min.js"></script>
  <script src="../libs/jspdf.umd.min.js"></script>
  <script src="../libs/html2canvas.min.js"></script>

  <!-- Utility scripts -->
  <script src="../utils/cvExtractor.js"></script>
  <script src="../utils/gemini.js"></script>
  <script src="../utils/htmlGenerator.js"></script>
  <script src="../utils/pdfGenerator.js"></script>

  <!-- Main popup script -->
  <script src="popup.js"></script>
</body>

</html>
